name: Download YouTube Files from Commit & Save to Repo
on:
  push:
    branches:
      - "**"
jobs:
  save-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: check commit for download URL
        run: |
          MSG=$(git log -1 --pretty=%B)

          if ! echo "$MSG" | grep --quiet --extended-regexp 'ytdl:|ytdl-audio'; then
            echo "❌ No download command found in commit message"
            exit 1
          fi

      - name: Install dependencies
        run: |
          sudo apt install --yes --no-install-recommends ffmpeg python3-mutagen

          mkdir --parents $HOME/.local/bin

          curl -fsSL https://deno.land/install.sh | DENO_INSTALL="$HOME/.local" sh

          curl --location https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp --output $HOME/.local/bin/yt-dlp
          chmod a+rx ~/.local/bin/yt-dlp

          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Create cookies file from secrets
        run: |
          echo "${{ secrets.YT_COOKIES }}" > cookies.txt

      - name: Extract URLs and download files
        run: |
          MSG=$(git log -1 --pretty=%B)
          URL_LINE=$(echo "$MSG" | grep --only-matching --perl-regexp '(ytdl:|ytdl-audio:)\s*\K.*')

          mkdir --parents downloads tmp_downloads

          args=("--downloader" "aria2c"
                "--output" "tmp_downloads/%(title)s.%(ext)s"
                "--remote-components" "ejs:github"
                "--cookies" "cookies.txt")

          if echo "$MSG" | grep --quiet 'ytdl-audio:'; then
            args+=("--extract-audio" "--embed-thumbnail")
          else
            args+=("--format" "bestvideo[height<=720]+bestaudio" "--embed-subs")
          fi

          for URL in $URL_LINE; do
            yt-dlp "${args[@]}" "$URL"
          done

          # Split any zip over 90MB using zip native split (unzip compatible)
          for FILE in tmp_downloads/*; do
            [ -f "$FILE" ] || continue
            SIZE=$(stat -c%s "$FILE")
            LIMIT=$((90 * 1024 * 1024))
            BASENAME=$(basename "$FILE")

            if [ "$SIZE" -gt "$LIMIT" ]; then
              echo "✂️ $BASENAME is $(( SIZE / 1024 / 1024 ))MB — splitting with zip..."
              # zip -s creates: file.zip, file.z01, file.z02, ...
              zip -0 --split-size 90m "downloads/${BASENAME}.zip" --junk-paths "$FILE"
              echo "✅ Parts: $(ls downloads/${BASENAME}* | wc -l)"
            else
              cp "$FILE" "downloads/$BASENAME"
            fi
          done

          rm -rf tmp_downloads

      - name: Commit & Push
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add downloads/
          git commit -m "Add downloaded files from commit [skip ci]" || echo "Nothing to commit"
          echo "🚀 Pushing to branch: $BRANCH"
          git push origin HEAD:$BRANCH
